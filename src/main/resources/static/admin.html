<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Uai Kimonos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --creme:#FBF4E4; --creme-2:#F3E8D2; --dourado:#C68A1F; --dourado-claro:#DFA93F;
  --azul:#1B3A6B; --azul-escuro:#122847; --preto:#14171C; --preto-2:#1F242B;
  --marrom:#7A6F5C; --branco:#FFFEFB; --vermelho:#B3392B; --vermelho-claro:#FDECEB;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--creme);color:var(--preto);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;}
a{text-decoration:none;color:inherit;}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid var(--dourado);outline-offset:3px;}
img{max-width:100%;}

/* Header Admin */
header{position:sticky;top:0;z-index:100;background:rgba(251,244,228,0.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(20,23,28,0.08);}
.nav{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px 16px;padding:14px 20px;max-width:1180px;margin:0 auto;}
.brand{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0;}
.brand-name{font-family:'Fraunces',serif;font-weight:700;font-size:1.25rem;color:var(--preto);white-space:nowrap;}
.brand-name span{color:var(--dourado);}
.admin-badge{background:var(--preto);color:var(--branco);padding:4px 10px;border-radius:6px;font-size:0.75rem;font-weight:700;font-family:'JetBrains Mono',monospace;text-transform:uppercase;white-space:nowrap;}
.nav .voltar-link{font-size:0.9rem;font-weight:600;color:var(--marrom);white-space:nowrap;}

/* Form Container */
.admin-wrap{max-width:760px;margin:48px auto;padding:0 20px;}
.admin-header{margin-bottom:32px;text-align:center;}
.admin-header h1{font-size:2.2rem;margin-bottom:8px;color:var(--azul);line-height:1.15;}
.admin-header p{color:var(--marrom);font-size:1rem;}

.admin-panel{background:var(--branco);padding:32px;border-radius:20px;box-shadow:0 8px 30px rgba(20,23,28,0.07);border:1px solid rgba(20,23,28,0.06);}

/* Tabs (Cadastrar / Editar / Excluir) */
.tabs{display:flex;gap:8px;margin-bottom:28px;background:var(--creme);padding:6px;border-radius:14px;border:1px solid rgba(20,23,28,0.06);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-btn{flex:1;min-width:max-content;padding:12px 16px;border:none;background:transparent;border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:0.95rem;color:var(--marrom);cursor:pointer;transition:background 0.2s ease,color 0.2s ease;white-space:nowrap;}
.tab-btn.active{background:var(--branco);color:var(--azul);box-shadow:0 3px 10px rgba(20,23,28,0.08);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.form-group.full{grid-column:1 / -1;}
.form-group{min-width:0;}

.form-group label{display:block;font-size:0.9rem;font-weight:600;margin-bottom:8px;color:var(--preto-2);}
.form-group .hint{display:block;font-size:0.78rem;font-weight:400;color:var(--marrom);margin-top:6px;}

.field-wrapper{display:flex;align-items:center;background:var(--creme);border:1px solid rgba(20,23,28,0.15);border-radius:12px;padding:0;transition:border-color 0.2s ease;min-width:0;}
.field-wrapper:focus-within{border-color:var(--dourado);}

.field-wrapper input, .field-wrapper select{width:100%;min-width:0;border:none;background:transparent;padding:12px 14px;font-family:'Inter',sans-serif;font-size:0.95rem;color:var(--preto);outline:none;}
.field-wrapper select{appearance:none;-webkit-appearance:none;cursor:pointer;}
.select-wrapper{position:relative;}
.select-wrapper::after{content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--dourado);pointer-events:none;font-size:0.85rem;}

.field-wrapper input[type="file"] {
  cursor: pointer;
  padding: 10px 14px;
  width:100%;
}

.btn-submit{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:14px 16px;margin-top:16px;border-radius:12px;font-weight:600;font-size:1rem;border:none;cursor:pointer;background:var(--azul);color:var(--branco);box-shadow:0 6px 18px rgba(27,58,107,0.22);transition:transform 0.2s ease,background 0.2s ease;}
.btn-submit:hover{background:var(--dourado);transform:translateY(-2px);}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.btn-danger{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:14px 16px;margin-top:16px;border-radius:12px;font-weight:600;font-size:1rem;border:none;cursor:pointer;background:var(--vermelho);color:var(--branco);box-shadow:0 6px 18px rgba(179,57,43,0.22);transition:transform 0.2s ease,background 0.2s ease;}
.btn-danger:hover{background:#8E2C20;transform:translateY(-2px);}
.btn-danger:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.btn-secondary{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:12px 16px;margin-top:10px;border-radius:12px;font-weight:600;font-size:0.9rem;border:1px solid rgba(20,23,28,0.15);cursor:pointer;background:transparent;color:var(--marrom);transition:border-color 0.2s ease,color 0.2s ease;}
.btn-secondary:hover{border-color:var(--dourado);color:var(--azul);}

/* Feedback Messages */
.alert{display:none;padding:16px;border-radius:12px;margin-top:20px;font-weight:500;font-size:0.95rem;text-align:center;word-break:break-word;}
.alert.success{display:block;background:#E4F4E8;color:#1A6B32;border:1px solid #BFE4C9;}
.alert.error{display:block;background:#FDECEB;color:#9A3A2C;border:1px solid #F8C9C4;}
.alert.info{display:block;background:#EAF1FB;color:var(--azul-escuro);border:1px solid #C9DCF8;}

/* Seletor de kimono para edição/exclusão */
.select-kimono-row{display:flex;gap:12px;align-items:stretch;margin-bottom:24px;}
.select-kimono-row .field-wrapper{flex:1;min-width:0;}
.btn-refresh{flex-shrink:0;padding:12px 16px;border-radius:12px;border:1px solid rgba(20,23,28,0.15);background:var(--creme);color:var(--marrom);font-weight:600;font-size:0.85rem;cursor:pointer;transition:border-color 0.2s ease,color 0.2s ease;white-space:nowrap;}
.btn-refresh:hover{border-color:var(--dourado);color:var(--azul);}

.edit-locked-banner{display:none;align-items:flex-start;gap:10px;background:var(--creme-2);border:1px solid rgba(198,138,31,0.3);border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:0.88rem;color:var(--preto-2);}
.edit-locked-banner.active{display:flex;}
.edit-locked-banner strong{color:var(--azul);}

.delete-locked-banner{display:none;align-items:flex-start;gap:10px;background:var(--vermelho-claro);border:1px solid rgba(179,57,43,0.3);border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:0.88rem;color:var(--preto-2);}
.delete-locked-banner.active{display:flex;}
.delete-locked-banner strong{color:var(--vermelho);}

.edit-fields{display:none;}
.edit-fields.active{display:block;}

.current-image-preview{display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap;}
.current-image-preview img{width:56px;height:56px;border-radius:10px;object-fit:cover;border:1px solid rgba(20,23,28,0.1);background:var(--creme);flex-shrink:0;}
.current-image-preview span{font-size:0.82rem;color:var(--marrom);font-family:'JetBrains Mono',monospace;word-break:break-all;}

.delete-card{display:flex;align-items:center;gap:16px;background:var(--creme);border:1px solid rgba(20,23,28,0.1);border-radius:14px;padding:16px;margin-bottom:8px;}
.delete-card img{width:64px;height:64px;border-radius:10px;object-fit:cover;border:1px solid rgba(20,23,28,0.1);background:var(--branco);flex-shrink:0;}
.delete-card .delete-card-info{flex:1;min-width:0;}
.delete-card .delete-card-info h3{font-size:1.05rem;color:var(--preto);margin-bottom:4px;word-break:break-word;}
.delete-card .delete-card-info p{font-size:0.85rem;color:var(--marrom);word-break:break-word;}
.delete-card .delete-card-info p span{font-family:'JetBrains Mono',monospace;}

/* ===== Tablet ===== */
@media (max-width:768px){
  .admin-wrap{margin:32px auto;}
  .admin-panel{padding:24px;}
}

/* ===== Mobile ===== */
@media (max-width:640px){
  .nav{padding:12px 16px;}
  .admin-header h1{font-size:1.7rem;}
  .admin-header p{font-size:0.9rem;}
  .admin-panel{padding:20px 16px;border-radius:16px;}
  .form-grid{grid-template-columns:1fr;gap:16px;}
  .select-kimono-row{flex-direction:column;align-items:stretch;}
  .btn-refresh{width:100%;}
  .delete-card{flex-direction:column;text-align:center;}
  .delete-card .delete-card-info{width:100%;}
  .current-image-preview{justify-content:center;text-align:left;}
  .tab-btn{font-size:0.88rem;padding:11px 14px;}
}

/* ===== Telas bem pequenas ===== */
@media (max-width:380px){
  .admin-wrap{padding:0 14px;margin:24px auto;}
  .admin-panel{padding:16px 12px;}
  .admin-header h1{font-size:1.45rem;}
  .brand-name{font-size:1.05rem;}
  .tabs{padding:4px;gap:4px;}
  .tab-btn{padding:10px 10px;font-size:0.82rem;}
  .field-wrapper input, .field-wrapper select{padding:11px 12px;font-size:0.9rem;}
  .btn-submit, .btn-danger, .btn-secondary{font-size:0.92rem;padding:13px 14px;}
}
</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="brand">
      <div class="brand-name">Uai <span>Kimonos</span></div>
      <span class="admin-badge">Admin</span>
    </div>
    <a href="products.html" class="voltar-link">← Voltar ao site</a>
  </div>
</header>

<main class="admin-wrap">
  <div class="admin-header">
    <h1 id="tituloPagina">Gerenciar Kimonos</h1>
    <p id="subtituloPagina">Cadastre um novo produto ou edite um já existente.</p>
  </div>

  <div class="admin-panel">

    <div class="tabs">
      <button type="button" class="tab-btn active" data-tab="cadastrar">Cadastrar</button>
      <button type="button" class="tab-btn" data-tab="editar">Editar</button>
      <button type="button" class="tab-btn" data-tab="excluir">Excluir</button>
    </div>

    <!-- ====================== ABA CADASTRAR ====================== -->
    <div class="tab-panel active" id="painel-cadastrar">
      <form id="formCadastrarKimono">
        <div class="form-grid">

          <div class="form-group full">
            <label for="nome">Nome do Produto</label>
            <div class="field-wrapper">
              <input type="text" id="nome" placeholder="Ex: Kimono Trançado Leve" required>
            </div>
          </div>

          <div class="form-group">
            <label for="tamanho">Tamanho</label>
            <div class="field-wrapper select-wrapper">
              <select id="tamanho" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="A0">A0</option>
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="A3">A3</option>
                <option value="A4">A4</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="cor">Cor</label>
            <div class="field-wrapper select-wrapper">
              <select id="cor" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="Branco">Branco</option>
                <option value="Azul">Azul</option>
                <option value="Preto">Preto</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="categoria">Categoria</label>
            <div class="field-wrapper select-wrapper">
              <select id="categoria" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="Treino">Treino</option>
                <option value="Competição">Competição</option>
                <option value="Premium">Premium</option>
                <option value="Infantil">Infantil</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="quantidade">Quantidade em Estoque</label>
            <div class="field-wrapper">
              <input type="number" id="quantidade" min="0" placeholder="Ex: 3" required>
            </div>
          </div>

          <div class="form-group">
            <label for="preco">Preço (R$)</label>
            <div class="field-wrapper">
              <input type="number" id="preco" step="0.01" min="0" placeholder="Ex: 290.00" required>
            </div>
          </div>

          <div class="form-group full">
            <label for="arquivoImagem">Imagem do Produto</label>
            <div class="field-wrapper">
              <input type="file" id="arquivoImagem" accept="image/*" required>
            </div>
          </div>

          <div class="form-group full">
            <button type="submit" class="btn-submit" id="btnSalvar">Cadastrar Produto</button>
          </div>
        </div>
      </form>

      <div id="mensagemFeedback" class="alert"></div>
    </div>

    <!-- ====================== ABA EDITAR ====================== -->
    <div class="tab-panel" id="painel-editar">

      <div class="select-kimono-row">
        <div class="field-wrapper select-wrapper">
          <select id="seletorKimono">
            <option value="" disabled selected>Carregando lista de kimonos...</option>
          </select>
        </div>
        <button type="button" class="btn-refresh" id="btnAtualizarLista" title="Atualizar lista">↻ Atualizar</button>
      </div>

      <div id="mensagemSeletor" class="alert"></div>

      <div class="edit-locked-banner" id="bannerEdicao">
        <span>✎</span>
        <span>Editando: <strong id="nomeKimonoSelecionado"></strong> — deixe em branco os campos que não quiser alterar.</span>
      </div>

      <div class="edit-fields" id="camposEdicao">
        <form id="formEditarKimono">
          <div class="form-grid">

            <div class="form-group full">
              <label for="editNome">Nome do Produto</label>
              <div class="field-wrapper">
                <input type="text" id="editNome" placeholder="Manter atual">
              </div>
            </div>

            <div class="form-group">
              <label for="editTamanho">Tamanho</label>
              <div class="field-wrapper select-wrapper">
                <select id="editTamanho">
                  <option value="">Manter atual</option>
                  <option value="A0">A0</option>
                  <option value="A1">A1</option>
                  <option value="A2">A2</option>
                  <option value="A3">A3</option>
                  <option value="A4">A4</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="editCor">Cor</label>
              <div class="field-wrapper select-wrapper">
                <select id="editCor">
                  <option value="">Manter atual</option>
                  <option value="Branco">Branco</option>
                  <option value="Azul">Azul</option>
                  <option value="Preto">Preto</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="editCategoria">Categoria</label>
              <div class="field-wrapper select-wrapper">
                <select id="editCategoria">
                  <option value="">Manter atual</option>
                  <option value="Treino">Treino</option>
                  <option value="Competição">Competição</option>
                  <option value="Premium">Premium</option>
                  <option value="Infantil">Infantil</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="editQuantidade">Quantidade em Estoque</label>
              <div class="field-wrapper">
                <input type="number" id="editQuantidade" min="0" placeholder="Manter atual">
              </div>
            </div>

            <div class="form-group">
              <label for="editPreco">Preço (R$)</label>
              <div class="field-wrapper">
                <input type="number" id="editPreco" step="0.01" min="0" placeholder="Manter atual">
              </div>
            </div>

            <div class="form-group full">
              <label for="editArquivoImagem">Imagem do Produto</label>
              <div class="field-wrapper">
                <input type="file" id="editArquivoImagem" accept="image/*">
              </div>
              <div class="current-image-preview" id="previewImagemAtual" style="display:none;">
                <img id="imgAtual" src="" alt="Imagem atual">
                <span id="caminhoImagemAtual"></span>
              </div>
              <span class="hint">Deixe em branco para manter a imagem atual.</span>
            </div>

            <div class="form-group full">
              <button type="submit" class="btn-submit" id="btnAtualizar">Salvar Alterações</button>
              <button type="button" class="btn-secondary" id="btnCancelarEdicao">Cancelar edição</button>
            </div>
          </div>
        </form>

        <div id="mensagemFeedbackEdicao" class="alert"></div>
      </div>

    </div>

    <!-- ====================== ABA EXCLUIR ====================== -->
    <div class="tab-panel" id="painel-excluir">

      <div class="select-kimono-row">
        <div class="field-wrapper select-wrapper">
          <select id="seletorKimonoExcluir">
            <option value="" disabled selected>Carregando lista de kimonos...</option>
          </select>
        </div>
        <button type="button" class="btn-refresh" id="btnAtualizarListaExcluir" title="Atualizar lista">↻ Atualizar</button>
      </div>

      <div id="mensagemSeletorExcluir" class="alert"></div>

      <div class="delete-locked-banner" id="bannerExclusao">
        <span>⚠</span>
        <span>Esta ação é <strong>permanente</strong> e não pode ser desfeita.</span>
      </div>

      <div class="edit-fields" id="camposExclusao">
        <div class="delete-card">
          <img id="imgExcluir" src="" alt="Imagem do kimono">
          <div class="delete-card-info">
            <h3 id="nomeKimonoExcluir"></h3>
            <p>Tamanho/Cor: <span id="detalhesKimonoExcluir"></span></p>
            <p>ID: <span id="idKimonoExcluir"></span></p>
          </div>
        </div>

        <button type="button" class="btn-danger" id="btnExcluir">Excluir Produto</button>
        <button type="button" class="btn-secondary" id="btnCancelarExclusao">Cancelar</button>

        <div id="mensagemFeedbackExclusao" class="alert"></div>
      </div>

    </div>

  </div>
</main>

<script>
/* ======================= CONFIG / ESTADO ======================= */
const SPRING_DEV_URL = 'http://localhost:8080';
const isLiveServer = window.location.port === '5500' || window.location.port === '5501';
const API_BASE_ORIGIN = isLiveServer ? SPRING_DEV_URL : window.location.origin;
const API_BASE = `${API_BASE_ORIGIN}/v1/kimonos`;

let kimonoAtual = null; // dados completos do kimono em edição (vindo do GET /v1/kimonos/{id})
let kimonoParaExcluir = null; // dados completos do kimono selecionado para exclusão

/* ======================= TABS ======================= */
const tabButtons = document.querySelectorAll('.tab-btn');
const tituloPagina = document.getElementById('tituloPagina');
const subtituloPagina = document.getElementById('subtituloPagina');

const textosPorAba = {
  cadastrar: { titulo: 'Cadastrar Kimono', sub: 'Preencha os dados abaixo para adicionar um novo produto ao catálogo.' },
  editar: { titulo: 'Editar Kimono', sub: 'Selecione um produto na lista e altere apenas os campos desejados.' },
  excluir: { titulo: 'Excluir Kimono', sub: 'Selecione um produto na lista para remover permanentemente do catálogo.' }
};

tabButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    tabButtons.forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById(`painel-${tab}`).classList.add('active');
    tituloPagina.textContent = textosPorAba[tab].titulo;
    subtituloPagina.textContent = textosPorAba[tab].sub;

    if (tab === 'editar') {
      carregarListaKimonos();
    }
    if (tab === 'excluir') {
      carregarListaKimonosExcluir();
    }
  });
});

/* ======================= Helper: extrai o ID do header Location ======================= */
function extrairIdDoLocation(location) {
  if (!location) return null;
  const partes = location.split('/').filter(Boolean);
  return partes[partes.length - 1];
}

/* ======================= CADASTRAR ======================= */
document.getElementById('formCadastrarKimono').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btnSalvar = document.getElementById('btnSalvar');
  const feedback = document.getElementById('mensagemFeedback');

  btnSalvar.textContent = "Salvando...";
  btnSalvar.disabled = true;
  feedback.className = "alert";
  feedback.textContent = "";

  const inputImagem = document.getElementById('arquivoImagem');

  if (inputImagem.files.length === 0) {
    feedback.textContent = "Por favor, selecione uma imagem!";
    feedback.classList.add('error');
    btnSalvar.disabled = false;
    return;
  }

  const arquivoReal = inputImagem.files[0];

  const payloadJson = {
    nome: document.getElementById('nome').value,
    tamanho: document.getElementById('tamanho').value,
    cor: document.getElementById('cor').value,
    categoria: document.getElementById('categoria').value,
    preco: parseFloat(document.getElementById('preco').value),
    quantidade: parseInt(document.getElementById('quantidade').value, 10),
    caminhoImagem: null
  };

  try {
    // 1. Cria o kimono (ainda sem imagem)
    const respostaCriar = await fetch(API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payloadJson)
    });

    if (!respostaCriar.ok) {
      throw new Error("Falha ao criar o kimono no Spring Boot.");
    }

    const location = respostaCriar.headers.get('Location');
    const novoId = extrairIdDoLocation(location);

    if (!novoId) {
      throw new Error("Não foi possível identificar o ID do kimono criado.");
    }

    // 2. Sobe a imagem para o Supabase Storage via Spring
    const dadosImagem = new FormData();
    dadosImagem.append('foto', arquivoReal);

    const respostaImagem = await fetch(`${API_BASE}/${novoId}/imagem`, {
      method: 'POST',
      body: dadosImagem
    });

    if (!respostaImagem.ok) {
      throw new Error("Kimono criado, mas falhou o upload da imagem.");
    }

    feedback.textContent = "Sucesso! Kimono cadastrado e imagem enviada.";
    feedback.classList.add('success');
    this.reset();

  } catch (error) {
    console.error(error);
    feedback.textContent = error.message || "Erro ao cadastrar o kimono. Verifique se o backend está ativo.";
    feedback.classList.add('error');
  } finally {
    btnSalvar.textContent = "Cadastrar Produto";
    btnSalvar.disabled = false;
  }
});

/* ======================= EDITAR ======================= */
const seletorKimono = document.getElementById('seletorKimono');
const mensagemSeletor = document.getElementById('mensagemSeletor');
const bannerEdicao = document.getElementById('bannerEdicao');
const nomeKimonoSelecionado = document.getElementById('nomeKimonoSelecionado');
const camposEdicao = document.getElementById('camposEdicao');
const previewImagemAtual = document.getElementById('previewImagemAtual');
const imgAtual = document.getElementById('imgAtual');
const caminhoImagemAtual = document.getElementById('caminhoImagemAtual');

document.getElementById('btnAtualizarLista').addEventListener('click', carregarListaKimonos);
document.getElementById('btnCancelarEdicao').addEventListener('click', fecharEdicao);

async function carregarListaKimonos() {
  mensagemSeletor.className = "alert";
  mensagemSeletor.textContent = "";
  seletorKimono.innerHTML = `<option value="" disabled selected>Carregando lista de kimonos...</option>`;
  fecharEdicao();

  try {
    const resposta = await fetch(`${API_BASE}/list`);
    if (!resposta.ok) throw new Error("Falha ao buscar lista.");

    const lista = await resposta.json();

    if (!Array.isArray(lista) || lista.length === 0) {
      seletorKimono.innerHTML = `<option value="" disabled selected>Nenhum kimono cadastrado</option>`;
      return;
    }

    seletorKimono.innerHTML = `<option value="" disabled selected>Selecione um kimono...</option>` +
      lista.map(k => `<option value="${k.kimonoId}">${k.nome} — ${k.tamanho} / ${k.cor}</option>`).join('');

  } catch (error) {
    console.error(error);
    seletorKimono.innerHTML = `<option value="" disabled selected>Erro ao carregar</option>`;
    mensagemSeletor.textContent = "Erro ao buscar a lista. Verifique se o backend está rodando.";
    mensagemSeletor.classList.add('error');
  }
}

seletorKimono.addEventListener('change', async function() {
  const id = this.value;
  if (!id) return;

  mensagemSeletor.className = "alert";
  mensagemSeletor.textContent = "Buscando dados do kimono...";
  mensagemSeletor.classList.add('info');
  fecharEdicao(false);

  try {
    const resposta = await fetch(`${API_BASE}/${id}`);
    if (!resposta.ok) throw new Error("Kimono não encontrado.");

    kimonoAtual = await resposta.json();
    preencherFormularioEdicao(kimonoAtual);

    mensagemSeletor.textContent = "";
    mensagemSeletor.className = "alert";

  } catch (error) {
    console.error(error);
    mensagemSeletor.textContent = "Erro ao buscar este kimono. Tente atualizar a lista.";
    mensagemSeletor.className = "alert error";
  }
});

function preencherFormularioEdicao(kimono) {
  document.getElementById('editNome').placeholder = `Manter atual: ${kimono.nome}`;
  document.getElementById('editTamanho').value = "";
  document.getElementById('editCor').value = "";
  document.getElementById('editCategoria').value = "";
  document.getElementById('editQuantidade').placeholder = `Manter atual: ${kimono.quantidade}`;
  document.getElementById('editPreco').placeholder = `Manter atual: ${kimono.preco}`;
  document.getElementById('editArquivoImagem').value = "";

  nomeKimonoSelecionado.textContent = kimono.nome;
  bannerEdicao.classList.add('active');
  camposEdicao.classList.add('active');

  if (kimono.caminhoImagem) {
    imgAtual.src = kimono.caminhoImagem;
    caminhoImagemAtual.textContent = kimono.caminhoImagem;
    previewImagemAtual.style.display = 'flex';
  } else {
    previewImagemAtual.style.display = 'none';
  }
}

function fecharEdicao(limparSelecao = true) {
  bannerEdicao.classList.remove('active');
  camposEdicao.classList.remove('active');
  document.getElementById('formEditarKimono').reset();
  previewImagemAtual.style.display = 'none';
  kimonoAtual = null;
  const feedbackEdicao = document.getElementById('mensagemFeedbackEdicao');
  feedbackEdicao.className = "alert";
  feedbackEdicao.textContent = "";
  if (limparSelecao) {
    seletorKimono.value = "";
  }
}

document.getElementById('formEditarKimono').addEventListener('submit', async function(e) {
  e.preventDefault();

  if (!kimonoAtual) return;

  const btnAtualizar = document.getElementById('btnAtualizar');
  const feedbackEdicao = document.getElementById('mensagemFeedbackEdicao');

  btnAtualizar.textContent = "Salvando alterações...";
  btnAtualizar.disabled = true;
  feedbackEdicao.className = "alert";
  feedbackEdicao.textContent = "";

  const novoNome = document.getElementById('editNome').value.trim();
  const novoTamanho = document.getElementById('editTamanho').value;
  const novaCor = document.getElementById('editCor').value;
  const novaCategoria = document.getElementById('editCategoria').value;
  const novaQuantidade = document.getElementById('editQuantidade').value;
  const novoPreco = document.getElementById('editPreco').value;
  const inputImagem = document.getElementById('editArquivoImagem');

  try {
    // 1. Atualiza os dados textuais do kimono (mantém o caminhoImagem atual por enquanto)
    const payloadJson = {
      ...kimonoAtual,
      nome: novoNome !== "" ? novoNome : kimonoAtual.nome,
      tamanho: novoTamanho !== "" ? novoTamanho : kimonoAtual.tamanho,
      cor: novaCor !== "" ? novaCor : kimonoAtual.cor,
      categoria: novaCategoria !== "" ? novaCategoria : kimonoAtual.categoria,
      quantidade: novaQuantidade !== "" ? parseInt(novaQuantidade, 10) : kimonoAtual.quantidade,
      preco: novoPreco !== "" ? parseFloat(novoPreco) : kimonoAtual.preco
    };

    const atualizarBackEnd = await fetch(`${API_BASE}/${kimonoAtual.kimonoId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payloadJson)
    });

    if (!atualizarBackEnd.ok) {
      throw new Error("Erro ao atualizar os dados do kimono.");
    }

    // 2. Se uma nova imagem foi escolhida, sobe ela e o backend já atualiza o caminhoImagem sozinho
    if (inputImagem.files.length > 0) {
      const arquivoReal = inputImagem.files[0];
      const dadosImagem = new FormData();
      dadosImagem.append('foto', arquivoReal);

      const respostaImagem = await fetch(`${API_BASE}/${kimonoAtual.kimonoId}/imagem`, {
        method: 'POST',
        body: dadosImagem
      });

      if (!respostaImagem.ok) {
        throw new Error("Dados atualizados, mas falhou o upload da nova imagem.");
      }
    }

    feedbackEdicao.textContent = "Sucesso! Kimono atualizado.";
    feedbackEdicao.classList.add('success');

    // Recarrega os dados atualizados do backend (já com a imagem nova, se houver)
    const respostaAtualizada = await fetch(`${API_BASE}/${kimonoAtual.kimonoId}`);
    kimonoAtual = await respostaAtualizada.json();
    preencherFormularioEdicao(kimonoAtual);
    carregarListaKimonos();

  } catch (error) {
    console.error(error);
    feedbackEdicao.textContent = error.message || "Erro ao atualizar o kimono. Verifique se o backend está ativo.";
    feedbackEdicao.classList.add('error');
  } finally {
    btnAtualizar.textContent = "Salvar Alterações";
    btnAtualizar.disabled = false;
  }
});

/* ======================= EXCLUIR (sem alterações de lógica) ======================= */
const seletorKimonoExcluir = document.getElementById('seletorKimonoExcluir');
const mensagemSeletorExcluir = document.getElementById('mensagemSeletorExcluir');
const bannerExclusao = document.getElementById('bannerExclusao');
const camposExclusao = document.getElementById('camposExclusao');
const imgExcluir = document.getElementById('imgExcluir');
const nomeKimonoExcluir = document.getElementById('nomeKimonoExcluir');
const detalhesKimonoExcluir = document.getElementById('detalhesKimonoExcluir');
const idKimonoExcluir = document.getElementById('idKimonoExcluir');
const btnExcluir = document.getElementById('btnExcluir');
const mensagemFeedbackExclusao = document.getElementById('mensagemFeedbackExclusao');

document.getElementById('btnAtualizarListaExcluir').addEventListener('click', carregarListaKimonosExcluir);
document.getElementById('btnCancelarExclusao').addEventListener('click', fecharExclusao);

async function carregarListaKimonosExcluir() {
  mensagemSeletorExcluir.className = "alert";
  mensagemSeletorExcluir.textContent = "";
  seletorKimonoExcluir.innerHTML = `<option value="" disabled selected>Carregando lista de kimonos...</option>`;
  fecharExclusao();

  try {
    const resposta = await fetch(`${API_BASE}/list`);
    if (!resposta.ok) throw new Error("Falha ao buscar lista.");

    const lista = await resposta.json();

    if (!Array.isArray(lista) || lista.length === 0) {
      seletorKimonoExcluir.innerHTML = `<option value="" disabled selected>Nenhum kimono cadastrado</option>`;
      return;
    }

    seletorKimonoExcluir.innerHTML = `<option value="" disabled selected>Selecione um kimono...</option>` +
      lista.map(k => `<option value="${k.kimonoId}">${k.nome} — ${k.tamanho} / ${k.cor}</option>`).join('');

  } catch (error) {
    console.error(error);
    seletorKimonoExcluir.innerHTML = `<option value="" disabled selected>Erro ao carregar</option>`;
    mensagemSeletorExcluir.textContent = "Erro ao buscar a lista. Verifique se o backend está rodando.";
    mensagemSeletorExcluir.classList.add('error');
  }
}

seletorKimonoExcluir.addEventListener('change', async function() {
  const id = this.value;
  if (!id) return;

  mensagemSeletorExcluir.className = "alert";
  mensagemSeletorExcluir.textContent = "Buscando dados do kimono...";
  mensagemSeletorExcluir.classList.add('info');
  fecharExclusao(false);

  try {
    const resposta = await fetch(`${API_BASE}/${id}`);
    if (!resposta.ok) throw new Error("Kimono não encontrado.");

    kimonoParaExcluir = await resposta.json();
    preencherCardExclusao(kimonoParaExcluir);

    mensagemSeletorExcluir.textContent = "";
    mensagemSeletorExcluir.className = "alert";

  } catch (error) {
    console.error(error);
    mensagemSeletorExcluir.textContent = "Erro ao buscar este kimono. Tente atualizar a lista.";
    mensagemSeletorExcluir.className = "alert error";
  }
});

function preencherCardExclusao(kimono) {
  nomeKimonoExcluir.textContent = kimono.nome;
  detalhesKimonoExcluir.textContent = `${kimono.tamanho} / ${kimono.cor}`;
  idKimonoExcluir.textContent = kimono.kimonoId;
  imgExcluir.src = kimono.caminhoImagem || '';

  bannerExclusao.classList.add('active');
  camposExclusao.classList.add('active');
}

function fecharExclusao(limparSelecao = true) {
  bannerExclusao.classList.remove('active');
  camposExclusao.classList.remove('active');
  kimonoParaExcluir = null;
  mensagemFeedbackExclusao.className = "alert";
  mensagemFeedbackExclusao.textContent = "";
  if (limparSelecao) {
    seletorKimonoExcluir.value = "";
  }
}

btnExcluir.addEventListener('click', async function() {
  if (!kimonoParaExcluir) return;

  const confirmou = confirm(`Tem certeza que deseja excluir "${kimonoParaExcluir.nome}"? Esta ação não pode ser desfeita.`);
  if (!confirmou) return;

  btnExcluir.textContent = "Excluindo...";
  btnExcluir.disabled = true;
  mensagemFeedbackExclusao.className = "alert";
  mensagemFeedbackExclusao.textContent = "";

  try {
    const excluirBackEnd = await fetch(`${API_BASE}/${kimonoParaExcluir.kimonoId}`, {
      method: 'DELETE'
    });

    if (excluirBackEnd.ok) {
      mensagemFeedbackExclusao.textContent = "Sucesso! Kimono excluído permanentemente.";
      mensagemFeedbackExclusao.classList.add('success');
      await carregarListaKimonosExcluir();
    } else {
      mensagemFeedbackExclusao.textContent = "Erro ao excluir o kimono no backend.";
      mensagemFeedbackExclusao.classList.add('error');
    }

  } catch (error) {
    console.error(error);
    mensagemFeedbackExclusao.textContent = "Erro: certifique-se de que o backend está ativo.";
    mensagemFeedbackExclusao.classList.add('error');
  } finally {
    btnExcluir.textContent = "Excluir Produto";
    btnExcluir.disabled = false;
  }
});
</script>
