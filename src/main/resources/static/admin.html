<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Uai Kimonos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --creme:#FBF4E4; --creme-2:#F3E8D2; --dourado:#C68A1F; --dourado-claro:#DFA93F;
  --azul:#1B3A6B; --azul-escuro:#122847; --preto:#14171C; --preto-2:#1F242B;
  --marrom:#7A6F5C; --branco:#FFFEFB;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--creme);color:var(--preto);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;}
a{text-decoration:none;color:inherit;}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid var(--dourado);outline-offset:3px;}

/* Header Admin */
header{position:sticky;top:0;z-index:100;background:rgba(251,244,228,0.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(20,23,28,0.08);}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:1180px;margin:0 auto;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-name{font-family:'Fraunces',serif;font-weight:700;font-size:1.25rem;color:var(--preto);}
.brand-name span{color:var(--dourado);}
.admin-badge{background:var(--preto);color:var(--branco);padding:4px 10px;border-radius:6px;font-size:0.75rem;font-weight:700;font-family:'JetBrains Mono',monospace;text-transform:uppercase;}

/* Form Container */
.admin-wrap{max-width:760px;margin:48px auto;padding:0 24px;}
.admin-header{margin-bottom:32px;text-align:center;}
.admin-header h1{font-size:2.2rem;margin-bottom:8px;color:var(--azul);}
.admin-header p{color:var(--marrom);font-size:1rem;}

.admin-panel{background:var(--branco);padding:32px;border-radius:20px;box-shadow:0 8px 30px rgba(20,23,28,0.07);border:1px solid rgba(20,23,28,0.06);}

/* Tabs (Cadastrar / Editar) */
.tabs{display:flex;gap:8px;margin-bottom:28px;background:var(--creme);padding:6px;border-radius:14px;border:1px solid rgba(20,23,28,0.06);}
.tab-btn{flex:1;padding:12px 16px;border:none;background:transparent;border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:0.95rem;color:var(--marrom);cursor:pointer;transition:background 0.2s ease,color 0.2s ease;}
.tab-btn.active{background:var(--branco);color:var(--azul);box-shadow:0 3px 10px rgba(20,23,28,0.08);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.form-group.full{grid-column:1 / -1;}

.form-group label{display:block;font-size:0.9rem;font-weight:600;margin-bottom:8px;color:var(--preto-2);}
.form-group .hint{display:block;font-size:0.78rem;font-weight:400;color:var(--marrom);margin-top:6px;}

.field-wrapper{display:flex;align-items:center;background:var(--creme);border:1px solid rgba(20,23,28,0.15);border-radius:12px;padding:0;transition:border-color 0.2s ease;}
.field-wrapper:focus-within{border-color:var(--dourado);}

.field-wrapper input, .field-wrapper select{width:100%;border:none;background:transparent;padding:12px 14px;font-family:'Inter',sans-serif;font-size:0.95rem;color:var(--preto);outline:none;}
.field-wrapper select{appearance:none;-webkit-appearance:none;cursor:pointer;}
.select-wrapper{position:relative;}
.select-wrapper::after{content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--dourado);pointer-events:none;font-size:0.85rem;}

.field-wrapper input[type="file"] {
  cursor: pointer;
  padding: 10px 14px;
}

.btn-submit{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:14px 16px;margin-top:16px;border-radius:12px;font-weight:600;font-size:1rem;border:none;cursor:pointer;background:var(--azul);color:var(--branco);box-shadow:0 6px 18px rgba(27,58,107,0.22);transition:transform 0.2s ease,background 0.2s ease;}
.btn-submit:hover{background:var(--dourado);transform:translateY(-2px);}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.btn-secondary{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:12px 16px;margin-top:10px;border-radius:12px;font-weight:600;font-size:0.9rem;border:1px solid rgba(20,23,28,0.15);cursor:pointer;background:transparent;color:var(--marrom);transition:border-color 0.2s ease,color 0.2s ease;}
.btn-secondary:hover{border-color:var(--dourado);color:var(--azul);}

/* Feedback Messages */
.alert{display:none;padding:16px;border-radius:12px;margin-top:20px;font-weight:500;font-size:0.95rem;text-align:center;}
.alert.success{display:block;background:#E4F4E8;color:#1A6B32;border:1px solid #BFE4C9;}
.alert.error{display:block;background:#FDECEB;color:#9A3A2C;border:1px solid #F8C9C4;}
.alert.info{display:block;background:#EAF1FB;color:var(--azul-escuro);border:1px solid #C9DCF8;}

/* Seletor de kimono para edição */
.select-kimono-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:24px;}
.select-kimono-row .field-wrapper{flex:1;}
.btn-refresh{flex-shrink:0;padding:12px 16px;border-radius:12px;border:1px solid rgba(20,23,28,0.15);background:var(--creme);color:var(--marrom);font-weight:600;font-size:0.85rem;cursor:pointer;transition:border-color 0.2s ease,color 0.2s ease;}
.btn-refresh:hover{border-color:var(--dourado);color:var(--azul);}

.edit-locked-banner{display:none;align-items:center;gap:10px;background:var(--creme-2);border:1px solid rgba(198,138,31,0.3);border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:0.88rem;color:var(--preto-2);}
.edit-locked-banner.active{display:flex;}
.edit-locked-banner strong{color:var(--azul);}

.edit-fields{display:none;}
.edit-fields.active{display:block;}

.current-image-preview{display:flex;align-items:center;gap:12px;margin-top:10px;}
.current-image-preview img{width:56px;height:56px;border-radius:10px;object-fit:cover;border:1px solid rgba(20,23,28,0.1);background:var(--creme);}
.current-image-preview span{font-size:0.82rem;color:var(--marrom);font-family:'JetBrains Mono',monospace;}

@media (max-width:640px){
  .form-grid{grid-template-columns:1fr;}
  .select-kimono-row{flex-direction:column;align-items:stretch;}
}
</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="brand">
      <div class="brand-name">Uai <span>Kimonos</span></div>
      <span class="admin-badge">Admin</span>
    </div>
    <a href="products.html" style="font-size:0.9rem; font-weight:600; color:var(--marrom);">← Voltar ao site</a>
  </div>
</header>

<main class="admin-wrap">
  <div class="admin-header">
    <h1 id="tituloPagina">Gerenciar Kimonos</h1>
    <p id="subtituloPagina">Cadastre um novo produto ou edite um já existente.</p>
  </div>

  <div class="admin-panel">

    <div class="tabs">
      <button type="button" class="tab-btn active" data-tab="cadastrar">Cadastrar</button>
      <button type="button" class="tab-btn" data-tab="editar">Editar</button>
    </div>

    <!-- ====================== ABA CADASTRAR ====================== -->
    <div class="tab-panel active" id="painel-cadastrar">
      <form id="formCadastrarKimono">
        <div class="form-grid">

          <div class="form-group full">
            <label for="nome">Nome do Produto</label>
            <div class="field-wrapper">
              <input type="text" id="nome" placeholder="Ex: Kimono Trançado Leve" required>
            </div>
          </div>

          <div class="form-group">
            <label for="tamanho">Tamanho</label>
            <div class="field-wrapper select-wrapper">
              <select id="tamanho" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="A0">A0</option>
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="A3">A3</option>
                <option value="A4">A4</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="cor">Cor</label>
            <div class="field-wrapper select-wrapper">
              <select id="cor" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="Branco">Branco</option>
                <option value="Azul">Azul</option>
                <option value="Preto">Preto</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="categoria">Categoria</label>
            <div class="field-wrapper select-wrapper">
              <select id="categoria" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="Treino">Treino</option>
                <option value="Competição">Competição</option>
                <option value="Premium">Premium</option>
                <option value="Infantil">Infantil</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="quantidade">Quantidade em Estoque</label>
            <div class="field-wrapper">
              <input type="number" id="quantidade" min="0" placeholder="Ex: 3" required>
            </div>
          </div>

          <div class="form-group">
            <label for="preco">Preço (R$)</label>
            <div class="field-wrapper">
              <input type="number" id="preco" step="0.01" min="0" placeholder="Ex: 290.00" required>
            </div>
          </div>

          <div class="form-group full">
            <label for="arquivoImagem">Imagem do Produto</label>
            <div class="field-wrapper">
              <input type="file" id="arquivoImagem" accept="image/*" required>
            </div>
          </div>

          <div class="form-group full">
            <button type="submit" class="btn-submit" id="btnSalvar">Cadastrar Produto</button>
          </div>
        </div>
      </form>

      <div id="mensagemFeedback" class="alert"></div>
    </div>

    <!-- ====================== ABA EDITAR ====================== -->
    <div class="tab-panel" id="painel-editar">

      <div class="select-kimono-row">
        <div class="field-wrapper select-wrapper">
          <select id="seletorKimono">
            <option value="" disabled selected>Carregando lista de kimonos...</option>
          </select>
        </div>
        <button type="button" class="btn-refresh" id="btnAtualizarLista" title="Atualizar lista">↻ Atualizar</button>
      </div>

      <div id="mensagemSeletor" class="alert"></div>

      <div class="edit-locked-banner" id="bannerEdicao">
        <span>✎</span>
        <span>Editando: <strong id="nomeKimonoSelecionado"></strong> — deixe em branco os campos que não quiser alterar.</span>
      </div>

      <div class="edit-fields" id="camposEdicao">
        <form id="formEditarKimono">
          <div class="form-grid">

            <div class="form-group full">
              <label for="editNome">Nome do Produto</label>
              <div class="field-wrapper">
                <input type="text" id="editNome" placeholder="Manter atual">
              </div>
            </div>

            <div class="form-group">
              <label for="editTamanho">Tamanho</label>
              <div class="field-wrapper select-wrapper">
                <select id="editTamanho">
                  <option value="">Manter atual</option>
                  <option value="A0">A0</option>
                  <option value="A1">A1</option>
                  <option value="A2">A2</option>
                  <option value="A3">A3</option>
                  <option value="A4">A4</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="editCor">Cor</label>
              <div class="field-wrapper select-wrapper">
                <select id="editCor">
                  <option value="">Manter atual</option>
                  <option value="Branco">Branco</option>
                  <option value="Azul">Azul</option>
                  <option value="Preto">Preto</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="editCategoria">Categoria</label>
              <div class="field-wrapper select-wrapper">
                <select id="editCategoria">
                  <option value="">Manter atual</option>
                  <option value="Treino">Treino</option>
                  <option value="Competição">Competição</option>
                  <option value="Premium">Premium</option>
                  <option value="Infantil">Infantil</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="editQuantidade">Quantidade em Estoque</label>
              <div class="field-wrapper">
                <input type="number" id="editQuantidade" min="0" placeholder="Manter atual">
              </div>
            </div>

            <div class="form-group">
              <label for="editPreco">Preço (R$)</label>
              <div class="field-wrapper">
                <input type="number" id="editPreco" step="0.01" min="0" placeholder="Manter atual">
              </div>
            </div>

            <div class="form-group full">
              <label for="editArquivoImagem">Imagem do Produto</label>
              <div class="field-wrapper">
                <input type="file" id="editArquivoImagem" accept="image/*">
              </div>
              <div class="current-image-preview" id="previewImagemAtual" style="display:none;">
                <img id="imgAtual" src="" alt="Imagem atual">
                <span id="caminhoImagemAtual"></span>
              </div>
              <span class="hint">Deixe em branco para manter a imagem atual.</span>
            </div>

            <div class="form-group full">
              <button type="submit" class="btn-submit" id="btnAtualizar">Salvar Alterações</button>
              <button type="button" class="btn-secondary" id="btnCancelarEdicao">Cancelar edição</button>
            </div>
          </div>
        </form>

        <div id="mensagemFeedbackEdicao" class="alert"></div>
      </div>

    </div>

  </div>
</main>

<script>
/* ======================= CONFIG / ESTADO ======================= */
const API_BASE = 'http://localhost:8080/v1/kimonos';
const NODE_BASE = 'http://localhost:3000';
let kimonoAtual = null; // dados completos do kimono em edição (vindo do GET /v1/kimonos/{id})

/* ======================= TABS ======================= */
const tabButtons = document.querySelectorAll('.tab-btn');
const tituloPagina = document.getElementById('tituloPagina');
const subtituloPagina = document.getElementById('subtituloPagina');

const textosPorAba = {
  cadastrar: { titulo: 'Cadastrar Kimono', sub: 'Preencha os dados abaixo para adicionar um novo produto ao catálogo.' },
  editar: { titulo: 'Editar Kimono', sub: 'Selecione um produto na lista e altere apenas os campos desejados.' }
};

tabButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    tabButtons.forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById(`painel-${tab}`).classList.add('active');
    tituloPagina.textContent = textosPorAba[tab].titulo;
    subtituloPagina.textContent = textosPorAba[tab].sub;

    if (tab === 'editar') {
      carregarListaKimonos();
    }
  });
});

/* ======================= CADASTRAR (sem alterações de lógica) ======================= */
document.getElementById('formCadastrarKimono').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btnSalvar = document.getElementById('btnSalvar');
  const feedback = document.getElementById('mensagemFeedback');

  btnSalvar.textContent = "Salvando...";
  btnSalvar.disabled = true;
  feedback.className = "alert";
  feedback.textContent = "";

  const inputImagem = document.getElementById('arquivoImagem');

  if (inputImagem.files.length === 0) {
    feedback.textContent = "Por favor, selecione uma imagem!";
    feedback.classList.add('error');
    btnSalvar.disabled = false;
    return;
  }

  const arquivoReal = inputImagem.files[0];
  const nomeDoArquivo = arquivoReal.name;
  const caminhoImagemFormatado = `/imagens/${nomeDoArquivo}`;

  const dadosImagem = new FormData();
  dadosImagem.append('foto', arquivoReal);

  const payloadJson = {
    nome: document.getElementById('nome').value,
    tamanho: document.getElementById('tamanho').value,
    cor: document.getElementById('cor').value,
    categoria: document.getElementById('categoria').value,
    preco: parseFloat(document.getElementById('preco').value),
    quantidade: parseInt(document.getElementById('quantidade').value, 10),
    caminhoImagem: caminhoImagemFormatado
  };

  try {
    const copiarMetodo = await fetch(`${NODE_BASE}/duplicar`, {
      method: 'POST',
      body: dadosImagem
    });

    if (!copiarMetodo.ok) {
      throw new Error("Falha ao duplicar a imagem localmente.");
    }

    const salvarBackEnd = await fetch(`${API_BASE}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payloadJson)
    });

    if (salvarBackEnd.ok) {
      feedback.textContent = "Sucesso! Imagem salva na pasta e dados enviados ao Spring Boot.";
      feedback.classList.add('success');
      this.reset();
    } else {
      feedback.textContent = "Erro ao salvar os dados no Spring Boot (Porta 8080).";
      feedback.classList.add('error');
    }

  } catch (error) {
    console.error(error);
    feedback.textContent = "Erro: certifique-se de que o comando 'node server.js' está ativo no terminal.";
    feedback.classList.add('error');
  } finally {
    btnSalvar.textContent = "Cadastrar Produto";
    btnSalvar.disabled = false;
  }
});

/* ======================= EDITAR ======================= */
const seletorKimono = document.getElementById('seletorKimono');
const mensagemSeletor = document.getElementById('mensagemSeletor');
const bannerEdicao = document.getElementById('bannerEdicao');
const nomeKimonoSelecionado = document.getElementById('nomeKimonoSelecionado');
const camposEdicao = document.getElementById('camposEdicao');
const previewImagemAtual = document.getElementById('previewImagemAtual');
const imgAtual = document.getElementById('imgAtual');
const caminhoImagemAtual = document.getElementById('caminhoImagemAtual');

document.getElementById('btnAtualizarLista').addEventListener('click', carregarListaKimonos);
document.getElementById('btnCancelarEdicao').addEventListener('click', fecharEdicao);

async function carregarListaKimonos() {
  mensagemSeletor.className = "alert";
  mensagemSeletor.textContent = "";
  seletorKimono.innerHTML = `<option value="" disabled selected>Carregando lista de kimonos...</option>`;
  fecharEdicao();

  try {
    const resposta = await fetch(`${API_BASE}/list`);
    if (!resposta.ok) throw new Error("Falha ao buscar lista.");

    const lista = await resposta.json();

    if (!Array.isArray(lista) || lista.length === 0) {
      seletorKimono.innerHTML = `<option value="" disabled selected>Nenhum kimono cadastrado</option>`;
      return;
    }

    seletorKimono.innerHTML = `<option value="" disabled selected>Selecione um kimono...</option>` +
      lista.map(k => `<option value="${k.kimonoId}">${k.nome} — ${k.tamanho} / ${k.cor}</option>`).join('');

  } catch (error) {
    console.error(error);
    seletorKimono.innerHTML = `<option value="" disabled selected>Erro ao carregar</option>`;
    mensagemSeletor.textContent = "Erro ao buscar a lista. Verifique se o Spring Boot (porta 8080) está rodando.";
    mensagemSeletor.classList.add('error');
  }
}

seletorKimono.addEventListener('change', async function() {
  const id = this.value;
  if (!id) return;

  mensagemSeletor.className = "alert";
  mensagemSeletor.textContent = "Buscando dados do kimono...";
  mensagemSeletor.classList.add('info');
  fecharEdicao(false);

  try {
    const resposta = await fetch(`${API_BASE}/${id}`);
    if (!resposta.ok) throw new Error("Kimono não encontrado.");

    kimonoAtual = await resposta.json();
    preencherFormularioEdicao(kimonoAtual);

    mensagemSeletor.textContent = "";
    mensagemSeletor.className = "alert";

  } catch (error) {
    console.error(error);
    mensagemSeletor.textContent = "Erro ao buscar este kimono. Tente atualizar a lista.";
    mensagemSeletor.className = "alert error";
  }
});

function preencherFormularioEdicao(kimono) {
  document.getElementById('editNome').placeholder = `Manter atual: ${kimono.nome}`;
  document.getElementById('editTamanho').value = "";
  document.getElementById('editCor').value = "";
  document.getElementById('editCategoria').value = "";
  document.getElementById('editQuantidade').placeholder = `Manter atual: ${kimono.quantidade}`;
  document.getElementById('editPreco').placeholder = `Manter atual: ${kimono.preco}`;
  document.getElementById('editArquivoImagem').value = "";

  nomeKimonoSelecionado.textContent = kimono.nome;
  bannerEdicao.classList.add('active');
  camposEdicao.classList.add('active');

  if (kimono.caminhoImagem) {
    imgAtual.src = kimono.caminhoImagem;
    caminhoImagemAtual.textContent = kimono.caminhoImagem;
    previewImagemAtual.style.display = 'flex';
  } else {
    previewImagemAtual.style.display = 'none';
  }
}

function fecharEdicao(limparSelecao = true) {
  bannerEdicao.classList.remove('active');
  camposEdicao.classList.remove('active');
  document.getElementById('formEditarKimono').reset();
  previewImagemAtual.style.display = 'none';
  kimonoAtual = null;
  const feedbackEdicao = document.getElementById('mensagemFeedbackEdicao');
  feedbackEdicao.className = "alert";
  feedbackEdicao.textContent = "";
  if (limparSelecao) {
    seletorKimono.value = "";
  }
}

document.getElementById('formEditarKimono').addEventListener('submit', async function(e) {
  e.preventDefault();

  if (!kimonoAtual) return;

  const btnAtualizar = document.getElementById('btnAtualizar');
  const feedbackEdicao = document.getElementById('mensagemFeedbackEdicao');

  btnAtualizar.textContent = "Salvando alterações...";
  btnAtualizar.disabled = true;
  feedbackEdicao.className = "alert";
  feedbackEdicao.textContent = "";

  // Pega valores dos campos; vazio = mantém o valor original do kimonoAtual
  const novoNome = document.getElementById('editNome').value.trim();
  const novoTamanho = document.getElementById('editTamanho').value;
  const novaCor = document.getElementById('editCor').value;
  const novaCategoria = document.getElementById('editCategoria').value;
  const novaQuantidade = document.getElementById('editQuantidade').value;
  const novoPreco = document.getElementById('editPreco').value;
  const inputImagem = document.getElementById('editArquivoImagem');

  let caminhoImagemFinal = kimonoAtual.caminhoImagem;

  try {
    // Se uma nova imagem foi escolhida, duplica no Node e atualiza o caminho
    if (inputImagem.files.length > 0) {
      const arquivoReal = inputImagem.files[0];
      const nomeDoArquivo = arquivoReal.name;
      caminhoImagemFinal = `/imagens/${nomeDoArquivo}`;

      const dadosImagem = new FormData();
      dadosImagem.append('foto', arquivoReal);

      const copiarMetodo = await fetch(`${NODE_BASE}/duplicar`, {
        method: 'POST',
        body: dadosImagem
      });

      if (!copiarMetodo.ok) {
        throw new Error("Falha ao duplicar a nova imagem localmente.");
      }
    }

    // Monta o objeto completo exigido pelo PUT, mesclando alterações com os dados originais
    const payloadJson = {
      ...kimonoAtual,
      nome: novoNome !== "" ? novoNome : kimonoAtual.nome,
      tamanho: novoTamanho !== "" ? novoTamanho : kimonoAtual.tamanho,
      cor: novaCor !== "" ? novaCor : kimonoAtual.cor,
      categoria: novaCategoria !== "" ? novaCategoria : kimonoAtual.categoria,
      quantidade: novaQuantidade !== "" ? parseInt(novaQuantidade, 10) : kimonoAtual.quantidade,
      preco: novoPreco !== "" ? parseFloat(novoPreco) : kimonoAtual.preco,
      caminhoImagem: caminhoImagemFinal
    };

    const atualizarBackEnd = await fetch(`${API_BASE}/${kimonoAtual.kimonoId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payloadJson)
    });

    if (atualizarBackEnd.ok) {
      feedbackEdicao.textContent = "Sucesso! Kimono atualizado.";
      feedbackEdicao.classList.add('success');
      kimonoAtual = payloadJson;
      preencherFormularioEdicao(kimonoAtual);
      carregarListaKimonos(); // atualiza nomes/labels na lista, caso o nome tenha mudado
    } else {
      feedbackEdicao.textContent = "Erro ao atualizar os dados no Spring Boot (Porta 8080).";
      feedbackEdicao.classList.add('error');
    }

  } catch (error) {
    console.error(error);
    feedbackEdicao.textContent = "Erro: certifique-se de que o comando 'node server.js' está ativo no terminal.";
    feedbackEdicao.classList.add('error');
  } finally {
    btnAtualizar.textContent = "Salvar Alterações";
    btnAtualizar.disabled = false;
  }
});
</script>

</body>
